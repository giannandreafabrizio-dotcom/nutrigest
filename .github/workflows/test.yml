name: NutriGest test suite (P78)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze test
        run: npm ci
        working-directory: test-suite

      - name: Esegui suite test (smoke + unit + render smoke)
        run: npm test
        working-directory: test-suite
